<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TabTidy</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <!-- Toast Notification -->
  <div id="toast" class="toast"></div>

  <!-- Loading Spinner -->
  <div id="loadingSpinner" class="loading-spinner" style="display: none;">
    <div class="spinner"></div>
    <div class="loading-text">Loading...</div>
  </div>

  <div class="container">
    <!-- Header -->
    <div class="header">
      <h1>🧹 TabTidy</h1>
      <div class="header-actions">
        <button id="helpBtn" class="icon-btn" title="Help & Features">ℹ️</button>
        <button id="settingsBtn" class="icon-btn" title="Settings">⚙️</button>
      </div>
    </div>

    <!-- Search Bar -->
    <div class="search-container">
      <input type="text" id="searchInput" placeholder="Search tabs..." />
      <select id="filterSelect" class="filter-select">
        <option value="all">All Tabs</option>
        <option value="pinned">📌 Pinned</option>
        <option value="unpinned">Unpinned</option>
        <option value="audible">🔊 Playing Audio</option>
        <option value="muted">🔇 Muted</option>
      </select>
    </div>

    <!-- Tabs Navigation -->
    <div class="tabs-nav">
      <div class="tabs-nav-buttons">
        <button class="tab-button active" data-tab="current">
          Tabs
          <span class="tab-count" id="currentTabCount">0</span>
        </button>
        <button class="tab-button" data-tab="saved">
          Groups
          <span class="tab-count" id="savedGroupCount">0</span>
        </button>
        <button class="tab-button" data-tab="history">
          History
          <span class="tab-count" id="historyCount">0</span>
        </button>
      </div>
      <div class="tabs-nav-actions">
        <div class="panel-actions active" data-for="current">
          <button id="toggleTabSelectMode" class="nav-action-btn" title="Select multiple tabs">☑️</button>
          <button id="toggleGroupView" class="nav-action-btn" title="Toggle display mode">📋</button>
        </div>
        <div class="panel-actions" data-for="saved">
          <button id="toggleSelectMode" class="nav-action-btn" title="Select multiple groups">☑️</button>
        </div>
        <div class="panel-actions" data-for="history">
          <button id="clearHistoryBtn" class="nav-action-btn" title="Clear all history">🗑️</button>
        </div>
      </div>
    </div>

    <!-- Tab Panels -->
    <div class="tab-panels">
      <!-- Current Tabs Panel -->
      <div class="tab-panel active" id="currentTabsPanel">
        <div id="tabBulkActions" class="bulk-actions" style="display: none;">
          <button id="selectAllTabsBtn" class="select-all-btn" title="Select all tabs">Select All</button>
          <span id="selectedTabCount" class="selected-count">0 selected</span>
          <button id="saveSelectedTabsBtn" class="action-btn primary" title="Save selected tabs">💾 Save</button>
          <button id="closeSelectedTabsBtn" class="action-btn" title="Close selected tabs">✖️ Close</button>
        </div>
        <div id="tabList" class="tab-list"></div>

        <!-- Quick Actions for Current Tabs (Fixed at Bottom) -->
        <div class="quick-actions-bottom">
          <button id="groupByDomainBtn" class="action-btn secondary" title="Organize tabs into groups by domain">🎨 Organize</button>
          <button id="ungroupAllBtn" class="action-btn secondary" title="Remove tab organization">✖️ Ungroup</button>
          <button id="undoCloseBtn" class="action-btn secondary" title="Restore last closed tab">⏮️ Undo</button>
          <button id="closeDuplicatesBtn" class="action-btn" title="Close duplicate tabs">✖️ Dupes</button>
          <button id="saveAllBtn" class="action-btn primary" title="Save all tabs">💾 Save</button>
        </div>
      </div>

      <!-- Saved Groups Panel -->
      <div class="tab-panel" id="savedGroupsPanel">
        <div id="bulkActions" class="bulk-actions" style="display: none;">
          <button id="selectAllGroupsBtn" class="select-all-btn" title="Select all groups">Select All</button>
          <span id="selectedCount" class="selected-count">0 selected</span>
          <button id="restoreSelectedBtn" class="action-btn" title="Open in current window">↗️ Open</button>
          <button id="restoreSelectedNewWindowBtn" class="action-btn" title="Open in new window">🪟 New Window</button>
          <button id="deleteSelectedBtn" class="action-btn" title="Delete selected groups">🗑️ Delete</button>
        </div>
        <div id="savedGroups" class="saved-groups"></div>
      </div>

      <!-- History Panel -->
      <div class="tab-panel" id="historyPanel">
        <div id="historyList" class="history-list"></div>
      </div>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
